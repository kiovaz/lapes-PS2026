services:
  api:
    build:
      context: .
      # target: production
      target: base
    container_name: ecommerce-api
    ports:
      - "${PORT_API:-3000}:3000"
      - "${PORT_PRISMA_STUDIO:-5555}:5555"
    env_file:
      - .env
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    # command: >
    #   sh -c "npx prisma migrate deploy &&
    #          npm run start:prod"
    command: >
      sh -c "npx prisma migrate deploy &&
             npm run start:dev"
    volumes:
      - .:/app
      - /app/node_modules

  frontend:
    build:
      context: ./frontend
      args:
        - VITE_STRIPE_PUBLIC_KEY=${STRIPE_PUBLIC_KEY}
        - VITE_API_URL=${VITE_API_URL}
    container_name: ecommerce-frontend
    ports:
      - "${PORT_FRONTEND:-5173}:80"
      # - "${PORT_FRONTEND:-5173}:5173"
    depends_on:
      - api

  db:
    image: postgres:16-alpine
    container_name: ecommerce-db
    ports:
      - "${PORT_POSTGRES:-5432}:5432"
    env_file:
      - .env
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: [ "CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-postgres}" ]
      interval: 5s
      timeout: 5s
      retries: 10

  redis:
    image: redis:7-alpine
    container_name: ecommerce-redis
    ports:
      - "${PORT_REDIS:-6379}:6379"
    healthcheck:
      test: [ "CMD", "redis-cli", "ping" ]
      interval: 5s
      timeout: 5s
      retries: 5
  #redis-commander:
  #  image: rediscommander/redis-commander:latest
  #  container_name: ecommerce-redis-commander
  #  ports:
  #    - "${PORT_REDIS_COMMANDER:-8081}:8081"
  #  environment:
  #    REDIS_HOSTS: local:redis:6379
  #  depends_on:
  #    redis:
  #      condition: service_healthy
volumes:
  postgres_data:
